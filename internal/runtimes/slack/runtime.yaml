name: slack
display: Slack

detect:
  commands: [python3]

options:
  agent:
    env: RAT_SLACK_AGENT
    description: Kernel name (e.g. pi@home) or MCP URL of agent for auto-replies

kernel:
  type: json
  script: kernel-slack.py

frontend:
  type: repl
  prompt: "slack> "

install:
  check_env: [SLACK_BOT_TOKEN]
  smoke:
    run: "/help"
    expect: "Slack kernel commands"

name: slack
display: Slack

detect:
  commands: [python3]

options:
  agent:
    env: RAT_SLACK_AGENT
    description: MCP URL of agent kernel to handle inbound messages

kernel:
  type: json
  script: kernel-slack.py

frontend:
  type: repl
  prompt: "slack> "

install:
  check_env: [SLACK_BOT_TOKEN]
  smoke:
    run: "/help"
    expect: "Slack kernel commands"
